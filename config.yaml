# ============================================================
# FDU SCCSCC26 - 可调参数声明（合规）
# v1.0.0: AWQ INT4 在线量化 — Triton fused dequant+matmul
# ============================================================

phase: 1

# v1.0.0: AWQ INT4 在线量化 — bf16 权重在加载时转为 AWQ INT4 格式
#   quant_force.py: ModelConfig monkey-patch → quantization="awq"
#   awq_online.py: 拦截权重加载, bf16→AWQ INT4（group_size=128）
#   AWQ Triton kernels: 融合 dequant+matmul（纯 Triton, ROCm 原生）
#   4x weight IO reduction: 13.5GB INT4 vs 54GB bf16 per decode
weight_quantization:
  enabled: true
  method: "awq"
  bits: 4
  group_size: 128
  zero_point: true
  mechanism: "fdu_vllm weight interceptor → AWQ Triton fused kernel"

kv_cache:
  strategy: "none"
  block_size: 16
  gpu_memory_utilization: 0.95
  enable_kv_quant: false
  kv_quant_dtype: "fp8"
  defrag_threshold: 0.7

attention:
  backend: "vllm_default"
  use_paged_attention: true
  num_kv_heads: 32
  num_q_heads: 64

fp8_weight_quant:
  enabled: false

executor:
  enable_prefix_caching: true
  use_cuda_graph: true
  cuda_graph_max_bs: 8

precision:
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01
