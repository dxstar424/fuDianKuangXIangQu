# ============================================================
# FDU SCCSCC26 - 可调参数声明（合规）
# v0.9.0: FP8 在线量化 — torch._scaled_mm ROCm HIP kernel
# ============================================================

phase: 1

# v0.9.0: FP8 W8A8 在线量化 — bf16 权重在模型加载时转为 FP8
# 策略：fdu_vllm/quant_force.py monkey-patch → quantization="fp8"
#       torch._scaled_mm: ROCm 原生 HIP kernel（无需 on-the-fly 反量化）
#       对比 v0.8.1 bitsandbytes: INT4 存储但 matmul_4bit 无 ROCm kernel
weight_quantization:
  enabled: true
  method: "fp8"
  bits: 8
  compute_dtype: "bfloat16"
  mechanism: "fdu_vllm monkey-patch → Fp8OnlineLinearMethod → torch._scaled_mm"

kv_cache:
  strategy: "none"
  block_size: 16
  gpu_memory_utilization: 0.95
  enable_kv_quant: false
  kv_quant_dtype: "fp8"
  defrag_threshold: 0.7

attention:
  backend: "vllm_default"
  use_paged_attention: true
  num_kv_heads: 32
  num_q_heads: 64

fp8_weight_quant:
  enabled: false

executor:
  enable_prefix_caching: true
  use_cuda_graph: true
  cuda_graph_max_bs: 8

precision:
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01
