# FDU SCCSCC26 active submission defaults: native gfx936, BF16 weights.
phase: 1

runtime:
  architecture: "gfx936"
  dtype: "bfloat16"
  require_installed_wheel: true

# The active launch path sets FDU_ENABLE=0. These values keep every legacy
# plugin hook off even if this file is inspected by a diagnostic tool.
kv_cache:
  strategy: "none"
  block_size: 16
  gpu_memory_utilization: 0.94
  enable_kv_quant: false
  kv_quant_dtype: "bfloat16"
  defrag_threshold: 0.7

attention:
  backend: "vllm_default"
  use_paged_attention: true
  enable_gqa_opt: false

executor:
  enable_prefix_caching: false
  use_cuda_graph: false
  enable_hip_graph: false

precision:
  weight_dtype: "bfloat16"
  online_weight_conversion: false
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01
