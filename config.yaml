# ============================================================
# FDU SCCSCC26 - 可调参数声明（合规）
# v0.5.0: AITER unified attention — 最简配置
# ============================================================

phase: 1

kv_cache:
  strategy: "none"
  block_size: 16
  gpu_memory_utilization: 0.95
  enable_kv_quant: false
  kv_quant_dtype: "fp8"
  defrag_threshold: 0.7

attention:
  backend: "vllm_default"
  use_paged_attention: true
  num_kv_heads: 32
  num_q_heads: 64

fp8_weight_quant:
  enabled: false

executor:
  enable_prefix_caching: false
  use_cuda_graph: true
  cuda_graph_max_bs: 1

precision:
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01
