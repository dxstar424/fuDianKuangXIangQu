# ============================================================
# FDU SCCSCC26 - 可调参数声明（合规）
# v0.8.0: bitsandbytes INT4 在线量化 — 不依赖 CLI flag
# ============================================================

phase: 1

# v0.8.0: bnb INT4 在线量化 — bf16 权重在模型加载时自动转为 INT4
# 策略：修改 vLLM 源码使 quantization 默认为 "bitsandbytes"
#       平台评测机 CLI flag 覆盖无效 — 源码级默认值不可覆盖
weight_quantization:
  enabled: true
  method: "bitsandbytes"
  bits: 4
  compute_dtype: "bfloat16"
  quant_type: "nf4"
  mechanism: "vLLM source patch (config/model.py default changed)"

kv_cache:
  strategy: "none"
  block_size: 16
  gpu_memory_utilization: 0.95
  enable_kv_quant: false
  kv_quant_dtype: "fp8"
  defrag_threshold: 0.7

attention:
  backend: "vllm_default"
  use_paged_attention: true
  num_kv_heads: 32
  num_q_heads: 64

fp8_weight_quant:
  enabled: false

executor:
  enable_prefix_caching: true
  use_cuda_graph: true
  cuda_graph_max_bs: 8

precision:
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01
