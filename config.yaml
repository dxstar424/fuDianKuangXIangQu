# ============================================================
# FDU SCCSCC26 — 可调参数声明
# 当前方案为 L1（仅 vLLM 启动参数，无源码改动 / 无 HIP kernel）。
# 锁定参数与官方 start_vllm.sh 一致，不可调整；仅 optimization 段可调。
# ============================================================

# --- 官方锁定参数（与评测命令一致，不得修改）---
locked:
  dtype: bfloat16
  tensor_parallel_size: 1
  max_num_seqs: 128
  max_num_batched_tokens: 4096
  gpu_memory_utilization: 0.95
  served_model_name: Qwen3.5-27B
  enable_thinking: false          # --default-chat-template-kwargs
  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder
  # 采样参数由评测客户端强制指定并锁定: temperature=0, max_tokens=1024

# --- 优化项（合规、可调；逐项本地验证后再在 launch.sh 启用）---
optimization:
  kv_cache_dtype: auto            # auto(=bf16) | fp8 | fp8_e4m3 | fp8_e5m2
                                  # 实验 A：验证 吞吐↑ 且 精度 Δ≤1% 后改为 fp8

# --- 精度闸门（用于自查，非启动参数）---
precision:
  accuracy_tolerance: 0.01        # 四任务相对基线跌幅 Δ ≤ 1% → 精度系数 1.0
