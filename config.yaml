# ============================================================
# FDU SCCSCC26 - 可调参数声明（合规）
# 禁止修改: max-num-seqs, max-num-batched-tokens, batch scheduler
# ============================================================

# --- Phase（1=最有把握 launch 项；2+=钩子）---
# 运行时以环境变量 FDU_PHASE 为准；评测默认 1
phase: 1

# --- KV Cache 管理 ---
kv_cache:
  strategy: "none"                 # 保持 none；defrag 未接线勿开
  block_size: 16
  gpu_memory_utilization: 0.95     # v0.2.17 B: 上探 0.95 + warmup + native graph
  enable_kv_quant: false           # 默认关，保精度系数
  kv_quant_dtype: "fp8"
  defrag_threshold: 0.7

# --- Attention 后端 ---
attention:
  backend: "vllm_default"          # S3：GQA wrap stock selector，勿默认 dcu_optimized
  use_paged_attention: true
  num_kv_heads: 32                 # Qwen3.5-27B GQA
  num_q_heads: 64

# --- 执行路径（不触碰 batch scheduler）---
executor:
  enable_prefix_caching: true      # Phase 1 必开
  use_cuda_graph: true             # v0.2.17 B: 开原生 HIP Graph
  cuda_graph_max_bs: 1             # 并发=1

# --- 精度门禁 ---
precision:
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01         # Δ ≤ 1%

# --- 已弃用（赛题禁止改 batch scheduler，并发=1 无收益）---
# scheduler: 见 src/scheduler/custom_scheduler.py（仅参考，不启用）
