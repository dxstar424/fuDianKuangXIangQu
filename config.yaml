# ============================================================
# FDU SCCSCC26 - 可调参数声明
# 策略: config 级参数通过 launch.sh 传入 vLLM
#       source 级参数通过 env var 控制 vLLM 源码 patch
# ============================================================

# --- vLLM 原生参数（由 launch.sh 传入）---
server:
  max_num_seqs: 256               # 最大并发序列数（baseline: 128）
  max_num_batched_tokens: 8192    # 单 batch 最大 token 数（baseline: 4096）
  gpu_memory_utilization: 0.95    # GPU 显存利用率（baseline: 0.92）
  enable_prefix_caching: true     # 共享前缀 KV 复用
  compilation_cudagraph_mode: 2   # HIP Graph 全量图捕获

# --- FDU 源码 patch 参数（通过环境变量控制）---
optimization:
  enable_kv_quant: true           # KV Cache FP8 在线量化
  kv_quant_dtype: "fp8"           # 量化类型: fp8 | int8
  enable_hip_graph: true          # HIP Graph 捕获
  scheduler_policy: "length_aware" # 调度策略: length_aware | fcfs
  enable_hip_flash_attn: false    # HIP FlashAttention kernel（待验证后开启）

# --- 精度控制 ---
precision:
  accuracy_tolerance: 0.01        # 容忍精度下降上限
