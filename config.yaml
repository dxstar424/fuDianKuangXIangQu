# ============================================================
# FDU SCCSCC26 - 可调参数声明（合规）
# v0.9.3: bf16 stock — 无重量化（FP8/bnb 在此平台 DCU 上均不可行）
# ============================================================

phase: 1

# v0.9.3: 无重量化 — bf16 原生推理
#   bnb INT4: matmul_4bit 无 ROCm HIP kernel（CPU 反量化, 0 收益）
#   FP8 W8A8: torch._scaled_mm 需 MI300+（gfx942 崩溃）
#   FP8 fallback: dequant+matmul = 81GB HBM > 54GB bf16（1.5x 更慢）
weight_quantization:
  enabled: false
  method: "none"
  reason: "No HIP-accelerated quant path for gfx942 DCU"

kv_cache:
  strategy: "none"
  block_size: 16
  gpu_memory_utilization: 0.95
  enable_kv_quant: false
  kv_quant_dtype: "fp8"
  defrag_threshold: 0.7

attention:
  backend: "vllm_default"
  use_paged_attention: true
  num_kv_heads: 32
  num_q_heads: 64

fp8_weight_quant:
  enabled: false

executor:
  enable_prefix_caching: true
  use_cuda_graph: true
  cuda_graph_max_bs: 8

precision:
  enforce_accuracy_check: true
  accuracy_tolerance: 0.01
